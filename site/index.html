<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>JLPT Subtitle Player</title>
  <meta name="theme-color" content="#c54a29">
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./assets/icon.svg">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
  <main class="app-root">
    <section id="library-screen" class="screen screen-library">
      <header class="library-header">
        <p class="eyebrow">JLPT N5-N3 Subtitle Study</p>
        <h1 class="library-title">보고 싶은 작품을 고르세요</h1>
      </header>
      <div id="library-list" class="library-list"></div>
      <div class="version-badge">v 0.0.11</div>
    </section>

    <section id="player-screen" class="screen screen-player is-hidden">
      <div id="player-stage" class="player-stage">
        <header class="player-topbar">
          <button id="back-button" class="icon-button text-button" type="button" aria-label="목록으로 돌아가기">
            <span class="icon-button__icon">←</span>
            <span class="text-button__label">목록</span>
          </button>
          <div class="player-topbar__center">
            <div id="show-title" class="player-title">작품</div>
            <div id="current-time" class="player-time">00:00:00</div>
          </div>
          <div class="player-topbar__spacer" aria-hidden="true"></div>
        </header>

        <section class="sentence-panel">
          <div id="current-sentence" class="current-sentence"></div>
          <div id="current-translation" class="current-translation"></div>
          <div class="next-point-inline">
            <span id="next-countdown" class="next-point-inline__time"></span>
            <span id="next-preview" class="next-point-inline__preview"></span>
          </div>
          <div id="annotation-rail" class="annotation-rail"></div>
        </section>

        <section class="controls-wrap">
          <div class="controls-main">
            <button id="seek-backward" class="transport-button" type="button" aria-label="5초 뒤로">
              <span class="transport-button__icon">↺</span>
              <span class="transport-button__meta">5s</span>
            </button>
            <button id="play-toggle" class="play-button" type="button" aria-label="재생">
              <span id="play-icon" class="play-button__icon">▶</span>
            </button>
            <button id="seek-forward" class="transport-button" type="button" aria-label="5초 앞으로">
              <span class="transport-button__icon">↻</span>
              <span class="transport-button__meta">5s</span>
            </button>
          </div>

          <div class="timeline-wrap">
            <input id="timeline" type="range" min="0" max="0" value="0">
            <div class="timeline-meta">
              <span id="timeline-position">00:00:00</span>
              <span id="timeline-duration">00:00:00</span>
            </div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="./assets/app.js"></script>
</body>
</html>
