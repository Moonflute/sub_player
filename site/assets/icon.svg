<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">JLPT Subtitle Player Icon</title>
  <desc id="desc">Rounded square icon with a play button and the hiragana character あ in the center.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6e9cf" />
      <stop offset="100%" stop-color="#e5c18f" />
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8623b" />
      <stop offset="100%" stop-color="#a93d20" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#7c5125" flood-opacity="0.22" />
    </filter>
  </defs>

  <rect x="28" y="28" width="456" height="456" rx="112" fill="url(#bg)" />
  <circle cx="256" cy="256" r="152" fill="#fff9f1" opacity="0.84" />
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="132" fill="url(#play)" />
    <path d="M214 176 L214 336 L346 256 Z" fill="#fff8f2" opacity="0.96" />
  </g>
  <text
    x="256"
    y="280"
    text-anchor="middle"
    font-size="116"
    font-weight="800"
    font-family="'Yu Gothic', 'Hiragino Sans', 'Meiryo', sans-serif"
    fill="#fff8f2"
  >あ</text>
</svg>
